name: Downstream

# actions/checkout is pinned to an immutable SHA; Dependabot bumps it weekly
# (.github/.dependabot.yaml, package-ecosystem: github-actions).

on:
  pull_request:
    branches: [ 'main', 'master' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  downstream-knative:
    name: Unit Test
    strategy:
      fail-fast: false # Keep running if one leg fails.
      matrix:
        include:
          - repo: eventing-autoscaler-keda
            org: knative-extensions
          - repo: eventing-ceph
            org: knative-extensions
          - repo: eventing-github
            org: knative-extensions
          - repo: eventing-gitlab
            org: knative-extensions
          - repo: eventing-kafka-broker
            org: knative-extensions
          - repo: eventing-rabbitmq
            org: knative-extensions

    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GOPATH: ${{ github.workspace }}
    steps:
    - name: Set up Go
      uses: knative/actions/setup-go@main
    - name: Install Dependencies
      run: |
        go install github.com/google/go-licenses@latest
    - name: Checkout Upstream
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6 — https://github.com/actions/checkout/releases/tag/v6
      with:
        path: ./src/knative.dev/${{ github.event.repository.name }}
    - name: Checkout Downstream
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6 — https://github.com/actions/checkout/releases/tag/v6
      with:
        repository: ${{ matrix.org }}/${{ matrix.repo }}
        path: ./src/knative.dev/${{ matrix.repo }}
    - name: Test downstream
      uses: knative/actions/go/downstream-test@main
      with:
        upstream-path: ./src/knative.dev/${{ github.event.repository.name }}
        downstream-path: ./src/knative.dev/${{ matrix.repo }}

